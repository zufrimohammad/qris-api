<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QRIS Kasir Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="ui.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="app" class="w-full max-w-lg mx-auto p-4">

        <!-- ========== STATE: INPUT ========== -->
        <div id="state-input" class="state-view">
            <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8">
                <div class="text-center mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">💳 QRIS Kasir</h1>
                    <p class="text-gray-500 text-sm mt-1">Generate QR pembayaran dinamis</p>
                </div>

                <form id="form-create" class="space-y-5">
                    <div>
                        <label for="nominal" class="block text-sm font-medium text-gray-700 mb-1">Nominal (Rp)</label>
                        <input
                            id="nominal"
                            type="number"
                            min="1"
                            placeholder="Contoh: 50000"
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                        />
                    </div>

                    <div>
                        <label for="qris" class="block text-sm font-medium text-gray-700 mb-1">QRIS String (Static)</label>
                        <textarea
                            id="qris"
                            rows="3"
                            placeholder="Paste static QRIS merchant di sini..."
                            required
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl text-sm font-mono focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition resize-none"
                        ></textarea>
                    </div>

                    <!-- Sound Toggle -->
                    <div class="flex items-center justify-between bg-gray-50 rounded-xl px-4 py-3">
                        <div class="flex items-center gap-2">
                            <span id="sound-icon" class="text-xl">🔊</span>
                            <span class="text-sm text-gray-700">Notifikasi Suara</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="sound-toggle" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-300 peer-focus:ring-2 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
                        </label>
                    </div>

                    <button
                        type="submit"
                        id="btn-generate"
                        class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl text-lg transition active:scale-[0.98]"
                    >
                        Generate QR
                    </button>

                    <div id="error-message" class="hidden text-red-600 text-sm text-center bg-red-50 rounded-xl p-3"></div>
                </form>
            </div>
        </div>

        <!-- ========== STATE: WAITING ========== -->
        <div id="state-waiting" class="state-view hidden">
            <div class="bg-white rounded-2xl shadow-lg p-6 md:p-8 text-center">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">Scan QR untuk Membayar</h2>

                <div id="qr-container" class="flex justify-center mb-5">
                    <img id="qr-image" src="" alt="QR Code" class="w-64 h-64 rounded-xl border-2 border-gray-200 shadow-sm" />
                </div>

                <div class="bg-gray-50 rounded-xl p-4 mb-5 space-y-2 text-sm">
                    <div class="flex justify-between">
                        <span class="text-gray-500">Nominal</span>
                        <span id="info-nominal" class="font-semibold text-gray-800">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">Kode Unik</span>
                        <span id="info-unique" class="font-semibold text-orange-600">-</span>
                    </div>
                    <div class="flex justify-between border-t pt-2">
                        <span class="text-gray-700 font-medium">Total Bayar</span>
                        <span id="info-total" class="font-bold text-blue-700 text-base">-</span>
                    </div>
                </div>

                <!-- Waiting animation -->
                <div class="waiting-pulse flex items-center justify-center gap-3 text-gray-500">
                    <div class="spinner"></div>
                    <span class="text-sm">Menunggu Pembayaran...</span>
                </div>

                <button
                    id="btn-cancel"
                    class="mt-5 text-sm text-gray-400 hover:text-gray-600 underline transition"
                >
                    Batalkan
                </button>
            </div>
        </div>

        <!-- ========== STATE: SUCCESS ========== -->
        <div id="state-success" class="state-view hidden">
            <div class="success-screen rounded-2xl shadow-lg p-8 text-center text-white">
                <div class="text-6xl mb-4">✅</div>
                <h2 class="text-2xl font-bold mb-2">PEMBAYARAN SUKSES</h2>
                <p id="success-amount" class="text-4xl font-extrabold mb-6">Rp 0</p>
                <p id="success-merchant" class="text-green-100 text-sm mb-8">-</p>

                <button
                    id="btn-new-transaction"
                    class="bg-white text-green-700 font-semibold px-8 py-3 rounded-xl hover:bg-green-50 transition active:scale-[0.98]"
                >
                    Transaksi Baru
                </button>
            </div>
            <!-- Confetti canvas -->
            <canvas id="confetti-canvas" class="fixed inset-0 pointer-events-none z-50"></canvas>
        </div>

    </div>

    <script src="ui.js"></script>
</body>
</html>
